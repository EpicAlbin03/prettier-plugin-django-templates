<main>
  {% if sections %}
    {% for section in sections %}
      <section id="{{ section.slug }}">
        <header>
          <h2>{{ section.title }}</h2>
        </header>
        <div class="content">
          {% if section.items %}
            <ul>
              {% for item in section.items %}
                <li>
                  <span>{{ item.name }}</span>
                  {% if item.meta %}
                    <small>{{ item.meta }}</small>
                  {% endif %}
                </li>
              {% endfor %}
            </ul>
          {% else %}
            <p>Empty</p>
          {% endif %}
        </div>
      </section>
    {% endfor %}
  {% else %}
    <p>No sections</p>
  {% endif %}
</main>
