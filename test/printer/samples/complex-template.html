{% block content %}
  <section class="hero">
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}
      <p>{{ page.subtitle }}</p>
    {% endif %}
  </section>
  <ul>
    {% for item in items %}
      <li><a href="{% url 'detail' item.slug %}">{{ item.title }}</a></li>
    {% empty %}
      <li>None</li>
    {% endfor %}
  </ul>
{% endblock %}
